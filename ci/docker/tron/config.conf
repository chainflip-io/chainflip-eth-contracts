# Witness private key is passed via -p flag in docker-compose to avoid storing it in config.
# It corresponds to keys/bashful/eth_private_key_file.
localwitness = []

block = {
  needSyncCheck = false
  maintenanceTimeInterval = 5000
  proposalExpireTime = 300000
}

# These parameters are designed for private chain testing only and cannot be freely switched on or off in production systems.
committee = {
  # TVM feature flags required for Solidity 0.8.x compiled with evmVersion=istanbul.
  # Setting these here enables them from block 0 so no runtime proposals are needed.
  allowCreationOfContracts = 1   # key 10
  allowTvmTransferTrc10 = 1      # key 19
  allowTvmConstantinople = 1     # key 26
  allowTvmSolidity059 = 1        # key 33
  allowTvmIstanbul = 1           # key 37 — required for CHAINID opcode
  # allowAdaptiveEnergy = 0
  # allowMultiSign = 0
  # allowDelegateResource = 0
  # allowSameTokenName = 0
  # forbidTransferToContract = 0
  # allowShieldedTRC20Transaction = 0
  # allowMarketTransaction = 0
  # allowProtoFilterNum = 0
  # allowAccountStateRoot = 0
  # changedDelegation = 0
  # allowPBFT = 0
  # pBFTExpireNum = 0
  # allowTransactionFeePool = 0
