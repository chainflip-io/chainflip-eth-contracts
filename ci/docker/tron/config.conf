storage {
  db.engine = "LEVELDB",
  db.sync = false,
  db.directory = "database",
  transHistory.switch = "on",
  balance.history.lookup = true
}

node.discovery = {
  # Enable so the node opens a p2p TCP listener (required to accept peer connections).
  # p2p.version = 42 ensures we're isolated from mainnet (11111) and testnet.
  enable = true
}

node.p2p.version = 42 # private network - isolated from mainnet (11111) and testnet

node {
  trustNode = "127.0.0.1:50051"

  # Fixed external IP avoids a NPE when libp2p fails to auto-detect the IP
  # (which happens in an isolated docker network with no internet access).
  externalIp = "127.0.0.1"

  listen.port = 18888

  http {
    fullNodeEnable = true
    fullNodePort = 8090
    solidityEnable = false
  }

  rpc {
    port = 50051
  }

  jsonrpc {
    httpFullNodeEnable = true
    httpFullNodePort = 8555
    httpSolidityEnable = false
  }

  maxTransactionPendingSize = 2000
}

genesis.block = {
  assets = [
    {
      # Hardhat deployer (account #0) — deploys contracts to the addresses in tron.env
      # EVM: 0xf39Fd6e51aad88F6f4ce6aB8827279cffFb92266
      accountName = "Deployer"
      accountType = "Normal"
      address = "TYBNgWfhGuNzdLtjKtxXTfskAhTbMcqbaG"
      balance = "100000000000000000"
    },
    {
      # Engine signing key (from keys/bashful/eth_private_key_file)
      # EVM: 0x076d3803349fd5FB48863c5Fc33483cB2243C0Df
      accountName = "Validator"
      accountType = "Normal"
      address = "TAeUa4FzpoveH7UUArvfXdeS3TmXiWU1ds"
      balance = "100000000000000000"
    },
    {
      accountName = "Blackhole"
      accountType = "AssetIssue"
      address = "TLsV52sRDL79HXGGm9yzwKibb6BeruhUzy"
      balance = "-9223372036854775808"
    }
  ]

  witnesses = [
    {
      # Engine signing key — this node produces blocks
      # EVM: 0x076d3803349fd5FB48863c5Fc33483cB2243C0Df
      address = "TAeUa4FzpoveH7UUArvfXdeS3TmXiWU1ds"
      url = "http://chainflip.io"
      voteCount = 10000000
